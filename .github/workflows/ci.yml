name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit

      - name: API Contract Tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests -q

      - name: Backend Smoke
        env:
          PYTHONPATH: backend
        run: python -c "from app import app; print(app.title)"

      - name: Security Check (Python)
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Smoke E2E
        shell: bash
        working-directory: frontend
        run: |
          PORT=3100 npm run start &
          APP_PID=$!
          trap "kill $APP_PID || true" EXIT
          sleep 10
          for path in / /admin; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3100$path")
            echo "$path -> $code"
            test "$code" = "200"
          done

      - name: Security Check (Node)
        continue-on-error: true
        run: npm audit --audit-level=high
        working-directory: frontend
